defaults:
  - model: vae
  - trainer: default
  - logger: wandb
  - _self_

checkpoint_dir: /content/drive/MyDrive/tarea03_checkpoints

data:
  data_dir: /content/mvtec
  classes:
    - cable
    - capsule
    - screw
    - transistor
  image_size: 128
  batch_size: 128
  num_workers: 4
  train_val_split: 0.85

seed: 42

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${model.name}_${model.loss}
